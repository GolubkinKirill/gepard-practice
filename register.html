<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ООО «Гепард» — Регистрация</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
    <div class="logo">
        <img src="images/logo.svg" alt="Логотип ООО Гепард">
        <span>ООО «Гепард»</span>
    </div>
    <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="login.html">Вход</a>
        <a href="register.html">Регистрация</a>
        <a href="dashboard.html">Личный кабинет</a>
    </nav>
</header>
<main class="container">
<section class="card">
    <h1>Регистрация</h1>
    <form>
        <div class="form-row">
            <div class="form-group">
                <label for="name">ФИО</label>
                <input id="name" type="text" placeholder="Введите ФИО">
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input id="phone" type="tel" placeholder="+7 900 000-00-00">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Введите email">
            </div>
            <div class="form-group">
                <label for="login">Логин</label>
                <input id="login" type="text" placeholder="Введите логин">
            </div>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input id="password" type="password" placeholder="Введите пароль">
        </div>
        <a class="button" href="dashboard.html">Зарегистрироваться</a>
        <p>Уже есть аккаунт? <a href="login.html" style="color:#60a5fa;">Войти</a></p>
    </form>
</section>
</main>
<footer class="footer">
    <span>© 2026 ООО «Гепард». Все права защищены.</span>
    <span>Нижний Новгород, Почаинская ул., д. 17в, к. 12</span>
</footer>
</body>
</html>
